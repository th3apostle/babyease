  <style>
    :root{
      --sky:#bfefff;
      --sky-soft:#eaf8ff;
      --mint:#bff3dd;
      --sun:#ffe78a;
      --coral:#ff9f91;
      --ink:#20314b;
      --text:#52627a;
      --cream:#fffdf4;
      --display:'Fredoka',system-ui,sans-serif;
      --body:'Nunito Sans',system-ui,sans-serif;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      text-align:center;
      font-family:var(--body);
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(191,239,255,.75), transparent 34%),
        radial-gradient(circle at 85% 22%, rgba(255,231,138,.72), transparent 32%),
        radial-gradient(circle at 50% 88%, rgba(191,243,221,.75), transparent 36%),
        linear-gradient(180deg,#fffdf4,#f6fcff);
      padding:28px;
    }

    .card{
      width:min(760px,100%);
      background:rgba(255,255,255,.86);
      border:1px solid rgba(32,49,75,.10);
      border-radius:42px;
      padding:44px 28px 38px;
      box-shadow:0 24px 70px rgba(49,89,124,.16);
      backdrop-filter:blur(16px);
    }

    .logo{
      width:min(300px,80%);
      margin:0 auto 8px;
      filter:drop-shadow(0 12px 22px rgba(35,74,112,.14));
    }

    h1{
      font-family:var(--display);
      font-size:clamp(38px,7vw,68px);
      line-height:.98;
      margin:8px 0 18px;
      font-weight:700;
      letter-spacing:-.035em;
    }

    h1 span:nth-child(1){color:#35a985}
    h1 span:nth-child(2){color:var(--coral)}

    p{
      max-width:540px;
      margin:0 auto;
      color:var(--text);
      font-size:clamp(16px,2vw,20px);
      line-height:1.65;
      font-weight:800;
    }

    .note{
      margin-top:24px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:0 20px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--sky),var(--mint));
      font-family:var(--display);
      font-weight:600;
      color:#17304a;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/images/Logo%20Babyease.png" alt="BabyEase" onerror="this.onerror=null;this.src='/images/babyease-logo.png';" />

    <h1>
      <span>BabyEase</span> <span>is getting ready.</span>
    </h1>

    <p>
      We’re preparing our baby collections and product pages so everything feels simple, helpful, and ready for parents.
    </p>

    <div class="note">Please check back soon</div>
  </main>
</body>
</html>
